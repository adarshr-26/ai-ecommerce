<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#141E30,#243B55);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
}

.signup-box{
background:white;
padding:40px;
border-radius:20px;
width:420px;
box-shadow:0px 15px 40px rgba(0,0,0,0.4);
animation: floatBox 1s ease;
}

@keyframes floatBox{
from{
transform: translateY(40px);
opacity:0;
}
to{
transform: translateY(0);
opacity:1;
}
}

h3{
text-align:center;
margin-bottom:25px;
font-weight:bold;
}

button{
width:100%;
border-radius:10px;
padding:10px;
font-size:18px;
}

button:hover{
transform:scale(1.03);
}

a{
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="signup-box">

<h3>🚀 Create Account</h3>

<form method="post">

{% csrf_token %}

{{ form.as_p }}

<button class="btn btn-primary">Signup</button>

</form>

<p class="mt-3 text-center">
Already have account?
<a href="/login/">Login</a>
</p>

</div>

</body>
</html>
