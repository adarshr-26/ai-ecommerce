<!DOCTYPE html>
<html>
<head>

<title>Signup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background-image:url("https://images.unsplash.com/photo-1607082349566-187342175e2f");
background-size:cover;
background-position:center;
font-family:Arial;
}

.signup-box{

width:420px;
padding:40px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);

border-radius:20px;

box-shadow:0 15px 40px rgba(0,0,0,0.4);

color:white;
}

h2{
text-align:center;
margin-bottom:25px;
font-weight:700;
}

label{
margin-top:10px;
}

input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:5px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#0d6efd;
color:white;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#0b5ed7;
transform:scale(1.03);
}

.login-link{
text-align:center;
margin-top:15px;
}

.login-link a{
color:#fff;
font-weight:bold;
text-decoration:none;
}

.login-link a:hover{
text-decoration:underline;
}

ul{
font-size:13px;
}

</style>

</head>


<body>


<div class="signup-box">

<h2>🚀 Create Account</h2>

<form method="post">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">
Signup
</button>

</form>

<div class="login-link">

Already have account?
<a href="/login/">Login</a>

</div>

</div>

</body>
</html>
