<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>
</head>
<body>

<h2>My Orders</h2>

{% for order in orders %}
    <div style="border:1px solid black; padding:10px; margin:10px;">
        <p><strong>Order ID:</strong> {{ order.id }}</p>
        <p><strong>Total Price:</strong> ₹{{ order.total_price }}</p>
        <p><strong>Date:</strong> {{ order.order_date }}</p>
    </div>
{% empty %}
    <p>No orders yet.</p>
{% endfor %}

</body>
</html>
